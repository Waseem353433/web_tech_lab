<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="profile.html">Profile</a>
        <a href="schedule.html">Schedule</a>
        <a href="contact.html">Contact</a>
    </nav>

<h1>Student Registration Form</h1>

<form>

    <!-- Name -->
    <label>Student Name:</label><br>
    <input type="text" name="name" placeholder="Enter your name"><br><br>

    <!-- Registration Number -->
    <label>Registration Number:</label><br>
    <input type="text" name="regno" placeholder="Enter your registration number"><br><br>

    <!-- Email -->
    <label>Email:</label><br>
    <input type="email" name="email" placeholder="Enter your email"><br><br>

    <!-- Password -->
    <label>Password:</label><br>
    <input type="password" name="password" placeholder="Enter password"><br><br>

    <!-- Course Dropdown -->
    <label>Select Course:</label><br>
    <select name="course">
        <option value="bscs">BS Computer Science</option>
        <option value="bscs">Software Engineering</option>
        <option value="bsit">Information Technology</option>
    </select><br><br>

    <!-- Semester Radio Buttons -->
    <label>Semester:</label><br>
    <input type="radio" name="semester" value="1"> Semester 1<br>
    <input type="radio" name="semester" value="2"> Semester 2<br>
    <input type="radio" name="semester" value="3"> Semester 3<br>
    <input type="radio" name="semester" value="4"> Semester 4<br><br>

    <!-- Terms and Conditions -->
    <input type="checkbox" name="terms"> I agree to the Terms and Conditions<br><br>

    <!-- Submit Button -->
    <input type="submit" value="Register">

</form>
<p><a href="index.html">Back to Home</a></p>

</body>
</html>
